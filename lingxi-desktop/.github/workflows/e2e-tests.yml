name: E2E Tests

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd lingxi-desktop
        npm ci
    
    - name: Install Playwright browsers
      run: |
        cd lingxi-desktop
        npx playwright install --with-deps chromium
    
    - name: Build application
      run: |
        cd lingxi-desktop
        npm run build
    
    - name: Start backend service
      run: |
        cd lingxi-backend
        npm ci
        npm run build &
        sleep 5
      continue-on-error: true
    
    - name: Run E2E tests
      run: |
        cd lingxi-desktop
        xvfb-run npx playwright test \
          --reporter=list \
          --timeout=60000 \
          --project=chromium
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: lingxi-desktop/playwright-report/
    
    - name: Upload test screenshots
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: test-screenshots
        path: lingxi-desktop/test-results/
    
    - name: Upload test logs
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: test-logs
        path: lingxi-desktop/logs/
